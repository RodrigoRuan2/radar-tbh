# Publica o app no GitHub Pages automaticamente a cada push na branch main.
# O GitHub baixa o código, instala as dependências, roda o build e publica
# a pasta dist/ — tudo na nuvem, sem precisar enviar arquivos compilados.
name: Deploy no GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # permite rodar manualmente pelo botão na aba Actions

# Permissões que a publicação no Pages exige
permissions:
  contents: read
  pages: write
  id-token: write

# Garante que apenas um deploy rode por vez
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o código
        uses: actions/checkout@v4
      - name: Preparar o Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Instalar dependências
        run: npm ci
      - name: Compilar o projeto
        run: npm run build
      - name: Enviar a pasta dist como artefato
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build # só roda depois que o build terminar com sucesso
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Publicar no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
